<div class="page-container">
  <p-confirmDialog />

  <div class="page-header">
    <h2 class="title">Tipos de Atención</h2>
    <div class="actions">
      <p-button
        icon="pi pi-refresh"
        [rounded]="true"
        [text]="true"
        severity="secondary"
        pTooltip="Recargar lista"
        (onClick)="store.loadCatalogs()"
      />
      <p-button
        label="Nuevo"
        icon="pi pi-plus"
        [rounded]="true"
        severity="primary"
        (onClick)="openCreate()"
      />
    </div>
  </div>

  <div class="table-container">
    <p-table
      [value]="store.tiposAtencion()"
      [loading]="store.loading()"
      styleClass="p-datatable-sm"
      [paginator]="true"
      [rows]="10"
      [rowsPerPageOptions]="[10, 20]"
    >
      <ng-template pTemplate="header">
        <tr>
          <th style="width: 30%">Nombre</th>
          <th style="width: 50%">Descripción</th>
          <th style="width: 20%" class="text-center">Acciones</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-item>
        <tr
          zoo-tipo-atencion-item
          [item]="item"
          (onEdit)="openEdit($event)"
          (onDelete)="deleteItem($event)"
        ></tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="3" class="empty-state">
            No hay tipos de atención registrados.
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>

  <p-dialog
    [header]="isEditing() ? 'Editar Tipo de Atención' : 'Nuevo Tipo de Atención'"
    [(visible)]="dialogVisible"
    [modal]="true"
    [style]="{ width: '450px' }"
    [draggable]="false"
    [resizable]="false"
    styleClass="dialog-form"
  >
    <form [formGroup]="form" class="form-content">
      <div class="field">
        <label for="nombre">Nombre <span class="required">*</span></label>
        <input
          pInputText
          id="nombre"
          formControlName="nombre"
          placeholder="Ej: Consulta General"
        />
        @if (form.controls.nombre.dirty && form.controls.nombre.invalid) {
        <small class="error-msg"
          >El nombre es requerido (mínimo 3 caracteres).</small
        >
        }
      </div>

      <div class="field">
        <label for="descripcion">Descripción</label>
        <textarea
          pInputTextarea
          id="descripcion"
          formControlName="descripcion"
          rows="3"
          placeholder="Detalles adicionales..."
        ></textarea>
      </div>
    </form>

    <ng-template pTemplate="footer">
      <div class="dialog-footer">
        <p-button
          label="Cancelar"
          icon="pi pi-times"
          [text]="true"
          (onClick)="dialogVisible.set(false)"
          [rounded]="true"
        />
        <p-button
          label="Guardar"
          icon="pi pi-check"
          [text]="true"
          [disabled]="form.invalid"
          (onClick)="save()"
          [rounded]="true"
        />
      </div>
    </ng-template>
  </p-dialog>
</div>
