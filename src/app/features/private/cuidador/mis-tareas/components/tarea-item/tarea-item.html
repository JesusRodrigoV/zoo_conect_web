<td class="row-index">{{ index() + 1 }}</td>
<td>
  <div class="task-info">
    <span class="task-title">{{ tarea().titulo }}</span>

    @if (esDieta()) {
    <span class="type-badge diet">
      <i class="pi pi-apple"></i>
      <span>Dieta</span>
    </span>
    }
  </div>
</td>

<td class="task-description">{{ tarea().descripcion }}</td>

<td>
  <div class="date-display">
    <i class="pi pi-calendar"></i>
    <span>{{ tarea().fechaProgramada | date:'mediumDate' }}</span>
  </div>
</td>

<td>
  <p-tag [value]="getEstadoLabel()" [severity]="getSeverity()" [rounded]="true">
  </p-tag>
</td>

<td class="actions-cell">
  @if (!tarea().isCompleted) {
  <p-button
    label="Ejecutar"
    icon="pi pi-play"
    [rounded]="true"
    class="p-button-outlined p-button-sm action-btn"
    (onClick)="onCompletar.emit(tarea())"
    [disabled]="isSaving()"
  />
  } @else {
  <div class="completed-indicator">
    <i class="pi pi-check-circle"></i>
    <span>Completado</span>
  </div>
  }
</td>
