<zoo-main-container>
  <section class="grid-container">
    @for (animal of animals(); track animal.id_animal) {
    <app-animal-item [animal]="animal" />
    } @if (hasMoreData()) {
    <div appInfiniteScroll (scrolled)="onScrollDown()" class="loading-trigger">
      @if (isLoading()) {
      <div class="spinner">
        <zoo-loader />
      </div>
      }
    </div>
    } @else {
    <div class="end-message">🐾 ¡Has llegado al final del refugio!</div>
    }
  </section>
</zoo-main-container>
