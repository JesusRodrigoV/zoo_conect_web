<div class="list-page">
  <div class="toolbar">
    <div class="filters-group">
      <p-select
        [options]="estadoOptions"
        [ngModel]="store.filters().estado"
        (ngModelChange)="onFilterEstado($event)"
        placeholder="Filtrar por estado"
        optionLabel="label"
        optionValue="value"
        styleClass="status-select"
      />

      <!--
      <div class="search-input-wrapper">
        <i class="pi pi-search search-icon"></i>
        <input
          pInputText
          type="number"
          placeholder="ID Animal..."
          (input)="onSearchAnimal($event)"
        />
      </div>
      -->
    </div>

    <div class="action-buttons">
      <p-button
        icon="pi pi-refresh"
        [text]="true"
        severity="secondary"
        [rounded]="true"
        pTooltip="Actualizar lista"
        (onClick)="store.loadHistoriales()"
      />
      <p-button
        label="Nuevo Historial"
        icon="pi pi-plus"
        severity="primary"
        [rounded]="true"
        routerLink="../crear"
      />
    </div>
  </div>

  <div class="table-container">
    <p-table
      [value]="store.items()"
      [loading]="store.loading()"
      [lazy]="true"
      (onPage)="onPageChange($event)"
      [paginator]="true"
      [rows]="store.pageSize()"
      [totalRecords]="store.total()"
      [rowsPerPageOptions]="[10, 20, 50]"
      styleClass="p-datatable-striped custom-table"
    >
      <ng-template pTemplate="header">
        <tr>
          <th style="width: 25%">Paciente</th>
          <th style="width: 20%">Fecha / Tipo</th>
          <th style="width: 35%">Motivo (Anamnesis)</th>
          <th style="width: 10%" class="text-center">Estado</th>
          <th style="width: 10%" class="text-center">Acciones</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-item>
        <tr zoo-historial-item [item]="item" (onView)="goToDetail($event)"></tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="empty-message-cell">
            <div class="empty-content">
              <i class="pi pi-folder-open empty-icon"></i>
              <span class="empty-title"
                >No se encontraron historiales clínicos.</span
              >
              <small class="empty-subtitle"
                >Intenta ajustar los filtros de búsqueda.</small
              >
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
