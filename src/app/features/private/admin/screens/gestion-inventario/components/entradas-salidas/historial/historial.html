<div class="history-container">
  <header class="history-header">
    <div class="title-block">
      <h2>Movimientos de Inventario</h2>
      <p>Historial de entradas y salidas de almacén</p>
    </div>

    <div class="actions-block">
      <p-datepicker
        [(ngModel)]="dateRange"
        selectionMode="range"
        [readonlyInput]="true"
        placeholder="Rango de Fechas"
        [showIcon]="true"
        styleClass="date-filter"
      />

      @if (dateRange() || searchTerm()) {
      <p-button
        icon="pi pi-filter-slash"
        [rounded]="true"
        [text]="true"
        severity="secondary"
        (onClick)="clearFilters()"
      />
      }

      <div class="create-buttons">
        <p-button
          label="Nueva Entrada"
          icon="pi pi-arrow-down"
          severity="success"
          [rounded]="true"
          routerLink="../../transacciones/crear-entrada"
        />
        <p-button
          label="Nueva Salida"
          icon="pi pi-arrow-up"
          severity="warn"
          [rounded]="true"
          routerLink="../../transacciones/crear-salida"
        />
      </div>
    </div>
  </header>

  <p-tabs [value]="activeTab()" (valueChange)="onTabChange($event)">
    <p-tablist>
      <p-tab value="entradas">
        <div class="flex items-center gap-2">
          <i class="pi pi-box"></i>
          <span>Entradas (Compras)</span>
        </div>
      </p-tab>
      <p-tab value="salidas">
        <div class="flex items-center gap-2">
          <i class="pi pi-sign-out"></i>
          <span>Salidas (Consumo)</span>
        </div>
      </p-tab>
    </p-tablist>

    <p-tabpanels>
      <p-tabpanel value="entradas">
        <zoo-tabla-entradas
          [entradas]="transactionStore.entradas()"
          [loading]="transactionStore.loading()"
          [totalRecords]="transactionStore.total()"
          (pageChange)="onPageChange($event)"
        />
      </p-tabpanel>

      <p-tabpanel value="salidas">
        <zoo-tabla-salidas
          [salidas]="transactionStore.salidas()"
          [loading]="transactionStore.loading()"
          [totalRecords]="transactionStore.total()"
          (pageChange)="onPageChange($event)"
        />
      </p-tabpanel>
    </p-tabpanels>
  </p-tabs>
</div>
